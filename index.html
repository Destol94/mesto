<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./index.css">
  <title>Mesto</title>
</head>
<body class="page">
  <header class="header">
    <img class="logo" src="./images/logo.svg" alt="лого">
    <div class="line"></div>
  </header>
  <main class="main">
    <section class="profile">
      <img class="avatar" alt="аватар" src="./images/image.png">
      <section class="profile__info">
        <div class="profile__name-edit">
          <p class="profile__name">Жак-Ив Кусто</p>
          <button class="profile__edit-button">
            <img class="profile__edit-button_img" alt="кнопка редактировать" src="./images/EditButton.svg">
          </button>
        </div>
        <p class="profile__description">Исследователь океана</p>
      </section>
      <button class="profile__add-button">
        <img src="./images/Vector+.svg" alt="+" class="profile__add-button_plus">
      </button>
    </section>
    <section class="photo-grid">
    </section>
    <section class="popup">
      <form class="popup__container" id="change-profile">
        <h3 class="popup__title">Редактировать профиль</h3>
        <input class="popup__field" type="text" placeholder="Имя" value="a" id="name" minlength="2" maxlength="40" required pattern="[а-яА-ЯёЁA-Za-z\s\-]*">
        <span class="popup__error-text" id="name-error"></span>
        <input class="popup__field" type="text" placeholder="О себе" value="a" id="description" minlength="2" maxlength="200" required>
        <span class="popup__error-text" id="description-error"></span>
        <button class="popup__button-save" type="submit">Сохранить</button>
        <button class="popup__button-close" type="button"><img class="popup__button-close_img" src="./images/CloseIcon.svg" alt="кнопка закрыть"></button>
      </form>
      <form class="popup__container" id="addCard">
        <h3 class="popup__title">Новое место</h3>
        <input class="popup__field" type="text" placeholder="Название" value="" id="image-title" required minlength="1" maxlength="30">
        <span class="popup__error-text" id="image-title-error"></span>
        <input class="popup__field" type="url" placeholder="Ссылка на картинку" value="" id="link-img" required>
        <span class="popup__error-text" id="link-img-error"></span>
        <button class="popup__button-save" type="submit">Создать</button>
        <button class="popup__button-close" type="button"><img class="popup__button-close_img" src="./images/CloseIcon.svg" alt="кнопка закрыть"></button>
      </form>
      <div class="viewImage">
        <img src="#" alt="" class="viewImage__item">
        <p class="viewImage__text"></p>
        <button class="popup__button-close" type="button"><img class="popup__button-close_img" src="./images/CloseIcon.svg" alt="кнопка закрыть"></button>
    </div>
    </section>
  </main>
  <footer class="footer">
    <p class="footer__text">&copy;&nbsp;2020 Denis Stekachev</p>
  </footer>
  <template id="card-template">
    <section class="photo-grid__item" id="photo-grid__item">
      <img class="photo-grid__img" src="" alt="">
      <div class="photo-grid__footer">
        <p class="photo-grid__figcaption"></p>
        <button class="photo-grid__like"></button>
      </div>
      <button class="photo-grid__delete"></button>
    </section>
  </template>
  <template id="viewImage">
    <div class="viewImage">
      <img src="" alt="" class="viewImage__item">
      <p class="viewImage__text"></p>
      <button class="popup__button-close" type="button"><img class="popup__button-close_img" src="./images/CloseIcon.svg" alt="кнопка закрыть"></button>
  </div>
  </template>
  <script type="module" src="./script.js"></script>
  <script type="module" src="./FormValidator.js"></script>
  <script type="module" src="./Card.js"></script>
</body>
</html>
